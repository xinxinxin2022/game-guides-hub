<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="egg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="180" fill="url(#glow)"/>
  <!-- DNA helix pattern -->
  <g opacity="0.15">
    <path d="M300,50 Q350,100 300,150 Q250,200 300,250 Q350,300 300,350" stroke="#e94560" fill="none" stroke-width="3"/>
    <path d="M500,50 Q450,100 500,150 Q550,200 500,250 Q450,300 500,350" stroke="#533483" fill="none" stroke-width="3"/>
    <line x1="310" y1="100" x2="490" y2="100" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
    <line x1="295" y1="150" x2="505" y2="150" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
    <line x1="310" y1="200" x2="490" y2="200" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
    <line x1="295" y1="250" x2="505" y2="250" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
    <line x1="310" y1="300" x2="490" y2="300" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Egg -->
  <ellipse cx="400" cy="210" rx="70" ry="90" fill="url(#egg)" opacity="0.9"/>
  <ellipse cx="385" cy="180" rx="25" ry="15" fill="white" opacity="0.15" transform="rotate(-20 385 180)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="680" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="200" cy="320" r="1" fill="white" opacity="0.4"/>
  <circle cx="600" cy="340" r="2" fill="white" opacity="0.5"/>
  <circle cx="50" cy="200" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="750" cy="180" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="450" cy="370" r="1" fill="white" opacity="0.3"/>
  <!-- Title text -->
  <text x="400" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold" opacity="0.8">Palworld Guides</text>
</svg>
